name: E2E / iOS
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  agent-device-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      checks: read
      contents: read
    concurrency:
      group: ${{ github.workflow_ref }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      JAVA_DISTRIBUTION: 'zulu'
      JAVA_VERSION: '17'
      SIMULATOR_NAME: iPhone 17 Pro
      USE_CCACHE: 1
      CCACHE_COMPILERCHECK: content
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup
        uses: ./.github/actions/setup

      - name: Calculate fingerprint
        id: calculate-fingerprint
        run: |
          FINGERPRINT=$(npx expo-updates fingerprint:generate --platform ios | jq -r '.hash')
          echo "Fingerprint for iOS: $FINGERPRINT"
          echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
        working-directory: example

      - name: Restore debug build from cache
        id: restore-debug-build
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ios-debug-build/
          key: ios-debug-build-${{ steps.calculate-fingerprint.outputs.fingerprint }}

      - name: Use appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: '26.3'

      - name: Install macOS dependencies
        run: |
          brew install ccache

      - name: Cache CocoaPods
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            example/ios/Pods
            ~/.cocoapods
            ~/Library/Caches/CocoaPods
          key: ios-pods-${{ runner.os }}-${{ steps.calculate-fingerprint.outputs.fingerprint }}
          restore-keys: |
            ios-pods-${{ runner.os }}-

      - name: Cache DerivedData
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: example/ios/build
          key: ios-deriveddata-${{ runner.os }}-${{ steps.calculate-fingerprint.outputs.fingerprint }}
          restore-keys: |
            ios-deriveddata-${{ runner.os }}-

      - name: Cache ccache
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.ccache
          key: ios-ccache-${{ runner.os }}-${{ steps.calculate-fingerprint.outputs.fingerprint }}
          restore-keys: |
            ios-ccache-${{ runner.os }}-

      - name: Set ccache directory
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"

      - name: Build iOS App
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        run: |
          yarn expo prebuild --platform ios
          xcodebuild ONLY_ACTIVE_ARCH=YES \
            -workspace ios/ReactNavigationExample.xcworkspace \
            -UseNewBuildSystem=YES \
            -scheme ReactNavigationExample \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -quiet
        working-directory: example

      - name: Prepare cache folder
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        run: |
          mkdir ios-debug-build
          mv example/ios/build/Build/Products/Debug-iphonesimulator/ReactNavigationExample.app ios-debug-build/ios-debug.app

      - name: Store debug build in cache
        if: steps.restore-debug-build.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ios-debug-build/
          key: ${{ steps.restore-debug-build.outputs.cache-primary-key }}

      - name: Setup JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Start Metro bundler
        run: yarn --cwd example start &

      - name: Boot iOS Simulator
        timeout-minutes: 5
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "$SIMULATOR_NAME" | head -n 1 | awk -F "[()]" '{print $2}')

          if [ -z "$DEVICE_ID" ]; then
            echo "No available simulator found for the criteria."
            xcrun simctl list devices available
            exit 1
          fi

          echo "Booting $SIMULATOR_NAME simulator with DEVICE_ID=$DEVICE_ID..."
          xcrun simctl boot "$DEVICE_ID" || true

          while ! xcrun simctl list devices | grep "$DEVICE_ID" | grep -q "(Booted)"; do
            sleep 2
          done

          echo "Simulator is booted!"

          # Add deep link handler so we don't see a prompt when running tests
          /usr/libexec/PlistBuddy "$HOME/Library/Developer/CoreSimulator/Devices/${DEVICE_ID}/data/Library/Preferences/com.apple.launchservices.schemeapproval.plist" -c "add com.apple.CoreSimulator.CoreSimulatorBridge-->rne string org.reactnavigation.playground"

      - name: Wait for Metro bundler
        timeout-minutes: 5
        run: |
          until curl -sSf "http://localhost:8081/.expo/.virtual-metro-entry.bundle?platform=ios&dev=true&minify=false" > /dev/null 2>&1; do
            sleep 2
          done

      - name: Run agent-device tests
        run: |
          xcrun simctl spawn booted log stream --style syslog > ~/agent-device-simulator.log 2>&1 & # Start capturing simulator logs in the background
          xcrun simctl install booted ../ios-debug-build/ios-debug.app
          yarn run e2e:native --platform ios
        working-directory: example

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown booted || true

      - name: Store debug output
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agent-device-artifacts-ios
          path: |
            example/agent-device-artifacts/**/*
            example/agent-device-state/**/*.log
          include-hidden-files: true
          overwrite: true

      - name: Store device logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agent-device-simulator-output
          path: |
            ~/Library/Logs/CoreSimulator/*
            example/agent-device-state/**/*.log
            ~/.agent-device/**/*.log
            ~/agent-device-simulator.log
          include-hidden-files: true
          overwrite: true
