name: Check for repro
on:
  issues:
    types:
      - opened
      - edited
      - labeled
  issue_comment:
    types:
      - created
      - edited

permissions:
  issues: write

jobs:
  check-repro:
    runs-on: ubuntu-latest
    if: (github.event.action == 'labeled' && github.event.label.name == 'needs repro') || github.event.action != 'labeled'
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const user = context.payload.comment
              ? context.payload.comment.user.login
              : context.payload.issue.user.login;
            const body = context.payload.comment
              ? context.payload.comment.body
              : context.payload.issue.body;

            const regex = new RegExp(
              `https?:\\/\\/((github\\.com\\/${user}\\/[^/\\s]+(?:\\/tree\\/[^\\s]+)?\\/?(?:\\s|$))|(www\\.typescriptlang\\.org\\/play\\?.+))`,
              'gm'
            );

            if (context.payload.action != 'labeled' && regex.test(body)) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['repro provided'],
              });

              try {
                await github.rest.issues.removeLabel({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'needs repro',
                });
              } catch (error) {
                if (!/Label does not exist/.test(error.message)) {
                  throw error;
                }
              }
            } else {
              if (context.eventName !== 'issues') {
                return;
              }

              const body = `Hey @${user}! Thanks for opening the issue. It seems that the issue doesn't contain a link to a repro, or the provided repro is not valid (e.g. broken link, private repo, code doesn't run etc.).

              **The best way to get attention to your issue is to provide an easy way for a developer to reproduce the issue.**

              You can provide a repro using any of the following:

              - Public GitHub repo under your username
              - [TypeScript Playground](https://www.typescriptlang.org/play)

              Try to keep the repro as small as possible by narrowing down the minimal amount of code needed to reproduce the issue. See ["How to create a Minimal, Reproducible Example"](https://stackoverflow.com/help/minimal-reproducible-example) for more information.

              **Don't:**

              - Link to your entire project or a project containing code unrelated to the issue.
              - Link to a specific file in a GitHub repo, as it won't be detected.

              You can edit your original issue to include a link to the repro, or leave it as a comment. **The issue will be closed automatically after a while** if you don't provide a valid repro.`

              const comments = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              if (comments.data.some((comment) => comment.body === body)) {
                return;
              }

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });

              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['needs repro'],
              });
            }
