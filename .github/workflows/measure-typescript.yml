name: TypeScript Performance

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/tsconfig*.json'
      - '**/package.json'
      - 'yarn.lock'
      - 'scripts/measure-typescript.ts'
      - '.github/workflows/measure-typescript.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Measure TypeScript performance
        id: measure
        run: |
          {
            echo 'report<<EOF'
            node scripts/measure-typescript.ts "origin/${{ github.base_ref }}" --runs 5 --json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment noticeable variations
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.measure.outputs.report }}
        with:
          script: |
            const MARKER = '<!-- ts-perf-report -->';
            const ROWS = [
              { key: 'types', label: 'Types' },
              { key: 'instantiations', label: 'Instantiations' },
              { key: 'memoryKB', label: 'Memory (MB)', transform: (v) => Math.round(v / 1024) },
              { key: 'checkTimeSec', label: 'Check time (s)', fraction: 2 },
              { key: 'totalTimeSec', label: 'Total time (s)', fraction: 2 },
            ];

            const report = JSON.parse(process.env.REPORT);
            const { metrics, noticeable } = report;

            const num = (v, fraction = 0) =>
              v.toLocaleString('en-US', { maximumFractionDigits: fraction, minimumFractionDigits: fraction });

            const delta = (v) => {
              if (v === null) return '—';
              const sign = v > 0 ? '+' : '';
              return `${sign}${v.toFixed(1)}%`;
            };

            const tableRows = ROWS.map(({ key, label, transform, fraction }) => {
              const m = metrics[key];
              const base = transform ? transform(m.base) : m.base;
              const curr = transform ? transform(m.current) : m.current;
              return `| ${label} | ${num(base, fraction)} | ${num(curr, fraction)} | ${delta(m.delta)} |`;
            }).join('\n');

            const body = `${MARKER}\n## TypeScript performance impact\n\n` +
              `Baseline: \`${report.baseline.ref}\` (\`${report.baseline.sha.slice(0, 10)}\`) · ` +
              `Current: \`${report.current.sha.slice(0, 10)}\` · ` +
              `${report.runs} run${report.runs === 1 ? '' : 's'}\n\n` +
              `| Metric | Baseline | Current | Δ |\n` +
              `| --- | ---: | ---: | ---: |\n` +
              tableRows + '\n';

            core.info(body);

            if (!noticeable) {
              core.info('No noticeable change - skipping PR comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body?.startsWith(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
