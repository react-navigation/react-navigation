name: TypeScript Performance

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/tsconfig*.json'
      - '**/package.json'
      - 'yarn.lock'
      - 'scripts/measure-typescript.ts'
      - '.github/workflows/measure-typescript.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      report: ${{ steps.measure.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Measure TypeScript performance
        id: measure
        run: |
          {
            echo 'report<<EOF'
            node scripts/measure-typescript.ts "origin/${{ github.base_ref }}" --runs 5 --json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  comment:
    needs: measure
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment noticeable variations
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          REPORT: ${{ needs.measure.outputs.report }}
        with:
          script: |
            const MARKER = '<!-- ts-perf-report -->';
            const ROWS = [
              { key: 'types', label: 'Types' },
              { key: 'instantiations', label: 'Instantiations' },
              { key: 'memoryKB', label: 'Memory (MB)', transform: (v) => Math.round(v / 1024) },
              { key: 'checkTimeSec', label: 'Check time (s)', fraction: 2 },
              { key: 'totalTimeSec', label: 'Total time (s)', fraction: 2 },
            ];
            const SERVER_ROWS = [
              { key: 'openCheckMs', label: 'Open + first check' },
              { key: 'hoverMs', label: 'Hover' },
              { key: 'completionMs', label: 'Completion' },
              { key: 'recheckMs', label: 'Re-check after edit' },
            ];

            const report = JSON.parse(process.env.REPORT);

            const text = (value) => String(value).replaceAll('`', '\\`').replaceAll('\n', ' ');
            const num = (value, fraction = 0) =>
              value.toLocaleString('en-US', { maximumFractionDigits: fraction, minimumFractionDigits: fraction });

            const delta = (value) => {
              if (value === null) return '—';
              const sign = value > 0 ? '+' : '';
              return `${sign}${value.toFixed(1)}%`;
            };

            const tableRows = ROWS.map(({ key, label, transform, fraction }) => {
              const m = report.metrics[key];
              const baseValue = transform ? transform(m.base) : m.base;
              const currValue = transform ? transform(m.current) : m.current;
              return `| ${label} | ${num(baseValue, fraction)} | ${num(currValue, fraction)} | ${delta(m.delta)} |`;
            }).join('\n');

            const serverRows = SERVER_ROWS.map(({ key, label }) => {
              const m = report.server[key];
              const d = m.base < 1 ? '—' : delta(m.delta);
              return `| ${label} | ${num(m.base, 1)} | ${num(m.current, 1)} | ${d} |`;
            }).join('\n');

            const body = `${MARKER}\n## TypeScript performance impact\n\n` +
              `Baseline: \`${text(report.baseline.ref)}\` (\`${text(report.baseline.sha).slice(0, 10)}\`) · ` +
              `Current: \`${text(report.current.sha).slice(0, 10)}\` · ` +
              `${num(report.runs)} run${report.runs === 1 ? '' : 's'}\n\n` +
              `### tsc type-check\n\n` +
              `| Metric | Baseline | Current | Δ |\n` +
              `| --- | ---: | ---: | ---: |\n` +
              tableRows + '\n\n' +
              `### tsserver latency\n\n` +
              `| Operation | Baseline | Current | Δ |\n` +
              `| --- | ---: | ---: | ---: |\n` +
              serverRows + '\n';

            core.info(body);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body?.startsWith(MARKER));

            if (report.noticeable !== true) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }

              core.info('No noticeable change - skipping PR comment.');
              return;
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
