name: TypeScript Performance

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/tsconfig*.json'
      - '**/package.json'
      - 'yarn.lock'
      - 'scripts/measure-typescript.ts'
      - '.github/workflows/measure-typescript.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  measure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      report: ${{ steps.measure.outputs.report }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Measure TypeScript performance
        id: measure
        run: |
          {
            echo 'report<<EOF'
            node scripts/measure-typescript.ts "origin/${{ github.base_ref }}" --runs 5 --json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  comment:
    needs: measure
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment noticeable variations
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          REPORT: ${{ needs.measure.outputs.report }}
        with:
          script: |
            const MARKER = '<!-- ts-perf-report -->';
            const ROWS = [
              { key: 'types', label: 'Types' },
              { key: 'instantiations', label: 'Instantiations' },
              { key: 'memoryKB', label: 'Memory (MB)', transform: (v) => Math.round(v / 1024) },
              { key: 'checkTimeSec', label: 'Check time (s)', fraction: 2 },
              { key: 'totalTimeSec', label: 'Total time (s)', fraction: 2 },
            ];

            const report = JSON.parse(process.env.REPORT);

            const metrics = report.metrics ?? {};

            const text = (value) => String(value ?? '').replaceAll('`', '\\`').replaceAll('\n', ' ');
            const value = (input) => Number.isFinite(Number(input)) ? Number(input) : 0;

            const num = (v, fraction = 0) =>
              value(v).toLocaleString('en-US', { maximumFractionDigits: fraction, minimumFractionDigits: fraction });

            const delta = (v) => {
              if (v === null) return '—';
              const n = value(v);
              const sign = n > 0 ? '+' : '';
              return `${sign}${n.toFixed(1)}%`;
            };

            const tableRows = ROWS.map(({ key, label, transform, fraction }) => {
              const m = metrics[key] ?? {};
              const base = value(m.base);
              const curr = value(m.current);
              const baseValue = transform ? transform(base) : base;
              const currValue = transform ? transform(curr) : curr;
              return `| ${label} | ${num(baseValue, fraction)} | ${num(currValue, fraction)} | ${delta(m.delta)} |`;
            }).join('\n');

            const body = `${MARKER}\n## TypeScript performance impact\n\n` +
              `Baseline: \`${text(report.baseline?.ref)}\` (\`${text(report.baseline?.sha).slice(0, 10)}\`) · ` +
              `Current: \`${text(report.current?.sha).slice(0, 10)}\` · ` +
              `${num(report.runs)} run${value(report.runs) === 1 ? '' : 's'}\n\n` +
              `| Metric | Baseline | Current | Δ |\n` +
              `| --- | ---: | ---: | ---: |\n` +
              tableRows + '\n';

            core.info(body);

            if (report.noticeable !== true) {
              core.info('No noticeable change - skipping PR comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body?.startsWith(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
