pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,tsx}'
      run: pnpm lint {staged_files}
    types:
      glob: '*.{json,js,ts,tsx}'
      run: pnpm typecheck
    types:standalone:static:
      glob: '*.{json,js,ts,tsx}'
      run: pnpm typecheck:standalone:static
    types:standalone:dynamic:
      glob: '*.{json,js,ts,tsx}'
      run: pnpm typecheck:standalone:dynamic
    types:declarations:
      glob: '*.{json,js,ts,tsx}'
      run: pnpm typecheck:declarations
    test:
      glob: '*.{json,js,ts,tsx}'
      run: pnpm test
    dependencies:
      glob: '{package.json,pnpm-lock.yaml}'
      run: pnpm versions check
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: pnpm commitlint --edit
