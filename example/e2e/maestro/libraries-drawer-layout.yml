appId: ${APP_ID}
name: Libraries - Drawer Layout
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: drawer-view
      TEXT: 'Drawer Layout'
- assertVisible:
    text: 'Open drawer'
- tapOn:
    text: 'Open drawer'
- extendedWaitUntil:
    visible:
      text: 'Close'
    timeout: 1500
- tapOn:
    text: 'Close'
    delay: 1000
- extendedWaitUntil:
    visible:
      text: 'Open drawer'
    timeout: 1500
- tapOn:
    text: 'Change position (left)'
    delay: 1500
- assertVisible:
    text: 'Change position (right)'
