appId: ${APP_ID}
name: Native Stack - Preload Flow
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: native-stack-preload-flow
      TEXT: 'Native Stack Preload Flow'
- assertVisible:
    text: 'Details is not preloaded yet.'
- tapOn:
    text: 'Preload Details'
- extendedWaitUntil:
    timeout: 5000
    visible: 'Details is preloaded!'
- tapOn:
    text: 'Navigate to Details'
- assertVisible:
    text: 'Loaded!'
- assertVisible:
    text: 'Preloaded'
- tapOn:
    text: 'Back to home'
- assertVisible:
    text: 'Details is not preloaded yet.'
- tapOn:
    text: 'Navigate to Details'
- assertVisible:
    text: 'Fresh'
- tapOn:
    text: 'Back to home'
# Test nested preload via navigate
- tapOn:
    text: 'Navigate with Nested Preload'
- assertVisible:
    text: 'Nested default screen'
- tapOn:
    text: 'Go to Nested'
- assertVisible:
    text: 'Nested Preloaded'
