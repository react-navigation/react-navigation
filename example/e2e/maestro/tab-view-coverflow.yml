appId: ${APP_ID}
name: Tab View - Coverflow
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/coverflow
      TEXT: 'Homogenic'
- assertVisible:
    text: 'Homogenic'
- swipe:
    duration: 300
    direction: LEFT
- assertVisible:
    text: 'Number of the Beast'
- swipe:
    duration: 300
    direction: LEFT
- assertVisible:
    text: "It's Blitz"
- swipe:
    duration: 300
    direction: RIGHT
- assertVisible:
    text: 'Number of the Beast'
- swipe:
    duration: 300
    direction: RIGHT
- assertVisible:
    text: 'Homogenic'
- swipe:
    duration: 300
    direction: RIGHT
- assertVisible:
    text: 'Bat Out of Hell'
- swipe:
    duration: 300
    direction: LEFT
- assertVisible:
    text: 'Homogenic'
