appId: ${APP_ID}
name: Tab View - Coverflow
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/coverflow
      TEXT: 'Homogenic'
- assertVisible:
    text: 'Homogenic'
- swipe:
    duration: 300
    direction: LEFT
- extendedWaitUntil:
    visible:
      text: 'Number of the Beast'
    timeout: 3000
- swipe:
    duration: 300
    direction: LEFT
- extendedWaitUntil:
    visible:
      text: "It's Blitz"
    timeout: 3000
- swipe:
    duration: 300
    direction: RIGHT
- extendedWaitUntil:
    visible:
      text: 'Number of the Beast'
    timeout: 3000
- swipe:
    duration: 300
    direction: RIGHT
- extendedWaitUntil:
    visible:
      text: 'Homogenic'
    timeout: 3000
- swipe:
    duration: 300
    direction: RIGHT
- extendedWaitUntil:
    visible:
      text: 'Bat Out of Hell'
    timeout: 3000
- swipe:
    duration: 300
    direction: LEFT
- extendedWaitUntil:
    visible:
      text: 'Homogenic'
    timeout: 3000
