appId: ${APP_ID}
name: Tab View - Coverflow
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/coverflow
      TEXT: 'Homogenic'
- assertVisible:
    text: 'Homogenic'
- swipe:
    duration: 100
    start: 90%, 50%
    end: 10%, 50%
- extendedWaitUntil:
    visible:
      text: 'Number of the Beast'
    timeout: 1500
- swipe:
    duration: 100
    start: 90%, 50%
    end: 10%, 50%
- extendedWaitUntil:
    visible:
      text: "It's Blitz"
    timeout: 1500
- swipe:
    duration: 100
    start: 10%, 50%
    end: 90%, 50%
- extendedWaitUntil:
    visible:
      text: 'Number of the Beast'
    timeout: 1500
- swipe:
    duration: 100
    start: 10%, 50%
    end: 90%, 50%
- extendedWaitUntil:
    visible:
      text: 'Homogenic'
    timeout: 1500
- swipe:
    duration: 100
    start: 10%, 50%
    end: 90%, 50%
- extendedWaitUntil:
    visible:
      text: 'Bat Out of Hell'
    timeout: 1500
- swipe:
    duration: 100
    start: 90%, 50%
    end: 10%, 50%
- extendedWaitUntil:
    visible:
      text: 'Homogenic'
    timeout: 1500
