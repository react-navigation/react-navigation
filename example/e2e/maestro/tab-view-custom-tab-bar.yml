appId: ${APP_ID}
name: Tab View - Custom Tab Bar
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/custom-tab-bar
      TEXT: 'Custom tab bar'
- assertVisible:
    text: 'Marissa Castillo'
- tapOn:
    id: 'albums'
- assertVisible:
    id: 'album-0'
- tapOn:
    id: 'article'
- assertVisible:
    text: 'What is Lorem Ipsum?'
- tapOn:
    id: 'chat'
    delay: 500
- assertVisible:
    text: 'make me a sandwich'
- tapOn:
    id: 'contacts'
- assertVisible:
    text: 'Marissa Castillo'
- swipe:
    direction: LEFT
    duration: 300
- assertVisible:
    id: 'album-0'
- swipe:
    direction: LEFT
    duration: 300
- assertVisible:
    text: 'What is Lorem Ipsum?'
- swipe:
    direction: RIGHT
    duration: 300
- assertVisible:
    id: 'album-0'
