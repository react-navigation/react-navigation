appId: ${APP_ID}
name: Native Bottom Tabs - Custom Tab Bar
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: native-bottom-tabs-custom-tab-bar
      TEXT: 'What is Lorem Ipsum?'
- tapOn:
    id: 'albums'
- runFlow:
    when:
      platform: Android
    commands:
      - waitForAnimationToEnd
- assertVisible:
    text: 'Albums'
- tapOn:
    text: 'Go to Contacts'
- assertVisible:
    text: 'Marissa Castillo'
- tapOn:
    id: 'albums'
- runFlow:
    when:
      platform: Android
    commands:
      - waitForAnimationToEnd
- assertVisible:
    text: 'Albums'
- tapOn:
    id: 'contacts'
- runFlow:
    when:
      platform: Android
    commands:
      - waitForAnimationToEnd
- assertVisible:
    text: 'Marissa Castillo'
- tapOn:
    id: 'article'
- runFlow:
    when:
      platform: Android
    commands:
      - waitForAnimationToEnd
- assertVisible:
    text: 'What is Lorem Ipsum?'
