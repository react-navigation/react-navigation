appId: ${APP_ID}
name: Tab View - Scrollable Tab Bar
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/scrollable-tab-bar
      TEXT: 'Contacts'
- assertVisible:
    text: 'Marissa Castillo'
- tapOn:
    text: 'Article'
- assertVisible:
    text: 'What is Lorem Ipsum?'
- tapOn:
    text: 'Albums'
- assertVisible:
    id: 'album-0'
- tapOn:
    text: 'Chat'
- assertVisible:
    text: 'make me a sandwich'
- tapOn:
    text: 'Contacts'
- assertVisible:
    text: 'Marissa Castillo'
- swipe:
    direction: LEFT
    duration: 300
- assertVisible:
    id: 'album-0'
- swipe:
    direction: LEFT
    duration: 300
- assertVisible:
    text: 'make me a sandwich'
- swipe:
    direction: RIGHT
    duration: 300
- assertVisible:
    id: 'album-0'
