    text: 'Article by Babel fish'
- tapOn:
    text: 'Navigate to feed'
- assertVisible:
    text: 'Feed'
- tapOn:
    text: 'Albums'
- assertVisible:
    text: 'Albums'
- tapOn:
    text: 'Go to Contacts'
- assertVisible:
    text: 'Marissa Castillo'
- tapOn:
    text: 'Albums'
- assertVisible:
    text: 'Albums'
- tapOn:
    text: 'Article'
- assertVisible:
    text: 'Article by Babel fish'
