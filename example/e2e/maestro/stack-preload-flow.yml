appId: ${APP_ID}
name: Stack - Preload Flow
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: stack-preload-flow
      TEXT: 'Stack Preload Flow'
- assertVisible:
    text: 'Details is not preloaded yet.'
- tapOn:
    text: 'Preload Details'
- assertVisible: 'Details is preloaded!'
- tapOn:
    text: 'Navigate to Details'
- assertVisible:
    text: 'Preloaded'
- assertVisible:
    text: 'Loaded!'
- tapOn:
    text: 'Back to home'
- tapOn:
    text: 'Navigate to Details'
- assertVisible:
    text: 'Fresh'
