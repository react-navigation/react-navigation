appId: ${APP_ID}
name: Tab View - Auto Width Tab Bar
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/auto-width-tab-bar
      TEXT: 'Marissa Castillo'
- tapOn:
    text: 'Article'
- assertVisible:
    text: 'What is Lorem Ipsum?'
- tapOn:
    text: 'Albums'
- assertVisible:
    id: 'album-0'
- tapOn:
    text: 'Chat'
- assertVisible:
    text: 'make me a sandwich'
- tapOn:
    text: 'Contacts'
- assertVisible:
    text: 'Marissa Castillo'
