appId: ${APP_ID}
name: Tab View - Auto Width Tab Bar
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/auto-width-tab-bar
      TEXT: 'Marissa Castillo'
- tapOn:
    text: 'Article'
- extendedWaitUntil:
    visible:
      text: 'What is Lorem Ipsum?'
    timeout: 1500
- tapOn:
    text: 'Albums'
- extendedWaitUntil:
    visible:
      id: 'album-0'
    timeout: 1500
- tapOn:
    text: 'Chat'
- extendedWaitUntil:
    visible:
      text: 'make me a sandwich'
    timeout: 1500
- tapOn:
    text: 'Contacts'
- extendedWaitUntil:
    visible:
      text: 'Marissa Castillo'
    timeout: 1500
