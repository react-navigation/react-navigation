appId: ${APP_ID}
name: Tab View - Scroll Adapter
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: libraries-tab-view/scroll-adapter
      TEXT: 'Marissa Castillo'
- tapOn:
    text: 'Article'
- assertVisible:
    text: 'What is Lorem Ipsum?'
- tapOn:
    text: 'Albums'
- assertVisible:
    id: 'album-0'
- tapOn:
    text: 'Contacts'
- assertVisible:
    text: 'Marissa Castillo'
