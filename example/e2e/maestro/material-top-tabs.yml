appId: ${APP_ID}
name: Material Top Tabs - Basic
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: material-top-tabs-basic
      TEXT: 'Chat'
- assertVisible:
    text: 'make me a sandwich'
- tapOn:
    text: 'Contacts'
- assertVisible:
    text: 'Marissa Castillo'
- tapOn:
    text: 'Albums'
- assertVisible:
    id: 'album-0'
- tapOn:
    text: 'Chat'
- assertVisible:
    text: 'make me a sandwich'
- swipe:
    direction: LEFT
    duration: 300
- assertVisible:
    text: 'Marissa Castillo'
- swipe:
    direction: LEFT
    duration: 300
- assertVisible:
    id: 'album-0'
- swipe:
    direction: RIGHT
    duration: 300
- assertVisible:
    text: 'Marissa Castillo'
