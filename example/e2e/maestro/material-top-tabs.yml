appId: ${APP_ID}
name: Material Top Tabs - Basic
---
- runFlow:
    file: ../launch.yml
    env:
      LINK: material-top-tabs-basic
      TEXT: 'Chat'
- assertVisible:
    text: 'make me a sandwich'
- tapOn:
    text: 'Contacts'
- extendedWaitUntil:
    visible:
      text: 'Marissa Castillo'
    timeout: 1500
- tapOn:
    text: 'Albums'
- extendedWaitUntil:
    visible:
      id: 'album-0'
    timeout: 1500
- tapOn:
    text: 'Chat'
- extendedWaitUntil:
    visible:
      text: 'make me a sandwich'
    timeout: 1500
- swipe:
    duration: 100
    direction: LEFT
- extendedWaitUntil:
    visible:
      text: 'Marissa Castillo'
    timeout: 1500
- swipe:
    duration: 100
    direction: LEFT
- extendedWaitUntil:
    visible:
      id: 'album-0'
    timeout: 1500
- swipe:
    duration: 100
    direction: RIGHT
- extendedWaitUntil:
    visible:
      text: 'Marissa Castillo'
    timeout: 1500
